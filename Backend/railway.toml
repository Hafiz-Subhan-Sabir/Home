# Backend service: set Railway "Root Directory" to Backend.
# Add PostgreSQL to this service — Railway sets DATABASE_URL; run migrate via releaseCommand.

[build]
builder = "NIXPACKS"

[deploy]
# Use python -m gunicorn so the app runs even when the gunicorn script dir is not on PATH (Railpack/slim images).
startCommand = "python -m gunicorn syndicate_backend.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 120"
releaseCommand = "python manage.py migrate --noinput && python manage.py collectstatic --noinput"
